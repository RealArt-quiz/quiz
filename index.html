<!DOCTYPE html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V6.3 Premium</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial,sans-serif;margin:0;background:#f4f7fb}.top{position:sticky;top:0;background:#2563eb;color:#fff;padding:12px;text-align:center}.wrap{max-width:900px;margin:auto;padding:10px}.card{background:#fff;border-radius:14px;padding:14px;margin:10px 0}.section{font-size:2rem;font-weight:bold;margin-top:30px}.q{font-size:1.4rem}.nums button{width:52px;height:52px;border:none;border-radius:50%;margin:2px}.sel{outline:3px solid #000}.note{width:100%;min-height:60px}.bar{height:22px;background:#ddd;border-radius:12px}.fill{height:100%;background:#22c55e}.sticky{position:sticky;bottom:0;background:#fff;padding:8px;text-align:center}</style></head><body><div class="top">💍 V6.3 Premium<br>Score <span id="score">0</span>/200 • <span id="pct">0</span>%<div class="bar"><div id="prog" class="fill" style="width:0%"></div></div></div><div class="wrap"><div class="card">Kandidatnavn <input id="candidate" style="width:100%"></div><div id="c"></div><div class="card"><h2>🏆 Styrker</h2><div id="strengths"></div><h2>⚠️ Udviklingsområder</h2><div id="weak"></div><h2>🤖 Analyse</h2><div id="analysis"></div></div><div class="card"><canvas id="pie"></canvas></div><div class="card"><canvas id="radar"></canvas></div></div><div class="sticky">Samlet: <span id="bottom">0</span>/200</div><script>const data={'Åndelige':['Stærkt forhold til Jehova','Døbt og loyal','Kristne egenskaber','Samme åndelige mål','Hjælper mig åndeligt'],'Karakter':['Respekt for familie','Ydmyg og lyttende','Håndterer uenigheder godt','Rimelig og fleksibel','Kærlig og hensynsfuld'],'Venskab':['Åben kommunikation','Nyder samvær','Kan blive bedste venner','Fælles interesser','Gensidig tillid'],'Ægteskab':['Syn på penge','Arbejder på problemer','Kærlighed og tilgivelse','Moden ægtefælle','Godt omdømme']};let id=0,s={};const c=document.getElementById('c');function col(v){return v<=3?'#ef4444':v<=6?'#f59e0b':v<=8?'#22c55e':'#166534'};for(let sec in data){c.insertAdjacentHTML('beforeend','<div class=section>'+sec+'</div>');data[sec].forEach(q=>{let h='<div class=card><div class=q>'+q+'</div>';for(let n=1;n<=10;n++)h+='<button style="background:'+col(n)+';color:white" data-i="'+id+'" data-q="'+q+'" data-v="'+n+'">'+n+'</button>';h+='<textarea class=note></textarea></div>';c.insertAdjacentHTML('beforeend',h);id++;});}document.querySelectorAll('button[data-i]').forEach(b=>b.onclick=function(){s[this.dataset.i]=+this.dataset.v;this.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');upd();});let pie,rad;function upd(){let total=Object.values(s).reduce((a,b)=>a+b,0);score.textContent=total;bottom.textContent=total;pct.textContent=Math.round(total/200*100);prog.style.width=Math.round(Object.keys(s).length/20*100)+'%';let st=[],wk=[];document.querySelectorAll('.sel').forEach(b=>{let v=+b.dataset.v,q=b.dataset.q;if(v>=9)st.push('✅ '+q);if(v<=5)wk.push('⚠️ '+q);});strengths.innerHTML=st.slice(0,5).join('<br>')||'Ingen';weak.innerHTML=wk.slice(0,5).join('<br>')||'Ingen';analysis.innerHTML=total>=170?'💚 Meget stærkt match':total>=140?'🟢 Lovende match':'🟡 Kræver mere afklaring';let arr=[0,0,0,0];for(let i=0;i<5;i++)arr[0]+=s[i]||0;for(let i=5;i<10;i++)arr[1]+=s[i]||0;for(let i=10;i<15;i++)arr[2]+=s[i]||0;for(let i=15;i<20;i++)arr[3]+=s[i]||0;if(window.Chart){if(pie)pie.destroy();if(rad)rad.destroy();pie=new Chart(document.getElementById('pie'),{type:'pie',data:{labels:['Åndelige','Karakter','Venskab','Ægteskab'],datasets:[{data:arr}]}});rad=new Chart(document.getElementById('radar'),{type:'radar',data:{labels:['Åndelige','Karakter','Venskab','Ægteskab'],datasets:[{label:'Score',data:arr}]},options:{scales:{r:{min:0,max:50}}}});}}</script></body></html>
