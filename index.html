<!DOCTYPE html><html lang="da"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ægtefælle Tjekliste V4.3.1</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>body{font-family:Arial,sans-serif;margin:0;background:#f4f7fb}.top{position:sticky;top:0;background:#2563eb;color:#fff;padding:12px;text-align:center}.wrap{max-width:1000px;margin:auto;padding:12px}.card{background:#fff;padding:14px;border-radius:14px;margin:10px 0}.section{font-size:2rem;font-weight:bold;margin-top:25px}.q{font-size:1.3rem;font-weight:bold}.nums button{width:52px;height:52px;border-radius:50%;border:0;margin:2px}.sel{outline:3px solid #000}.note{width:100%;min-height:60px}.bar{height:22px;background:#ddd;border-radius:12px;overflow:hidden}.fill{height:100%;background:#22c55e}</style></head><body><div class='top'>💍 V4.3.1 Premium · Score <span id='score'>0</span>/200 · <span id='pct'>0</span>%</div><div class='wrap'><div class='card'>Kandidatnavn <input id='candidate' style='width:100%'></div><div class='card'><button onclick='saveJson()'>💾 Gem JSON</button><button onclick='loadInput.click()'>📂 Indlæs JSON</button><input id='loadInput' type='file' accept='.json' style='display:none'><button onclick='printReport()'>📄 PDF Rapport</button></div><div class='card'><div class='bar'><div id='prog' class='fill' style='width:0%'></div></div></div><div id='content'></div><div class='card'><h3>🏆 Styrker</h3><div id='strengths'></div><h3>⚠️ Udviklingsområder</h3><div id='weak'></div><h3>🤖 Analyse</h3><div id='analysis'></div></div><div class='card'><canvas id='pie'></canvas></div><div class='card'><canvas id='radar'></canvas></div></div><script>const data={'🙏 Åndelige værdier':['Stærkt forhold til Jehova','Døbt og loyal','Kristne egenskaber','Samme åndelige mål','Hjælper mig åndeligt'],'👤 Karakter':['Respekt for familie','Ydmyg og lyttende','Håndterer uenigheder godt','Rimelig og fleksibel','Kærlig og hensynsfuld'],'🤝 Venskab':['Åben kommunikation','Nyder samvær','Kan blive bedste venner','Fælles interesser','Gensidig tillid'],'💍 Ægteskab':['Syn på penge','Arbejder på problemer','Kærlighed og tilgivelse','Moden ægtefælle','Godt omdømme']};let scores={};const content=document.getElementById('content');let idx=0;function col(v){return v<=3?'#ef4444':v<=6?'#f59e0b':v<=8?'#22c55e':'#166534'};for(const sec in data){content.insertAdjacentHTML('beforeend','<div class="section">'+sec+'</div>');data[sec].forEach(q=>{let h='<div class="card"><div class="q">'+q+'</div><div class="nums">';for(let n=1;n<=10;n++)h+='<button style="background:'+col(n)+';color:#fff" data-id="'+idx+'" data-q="'+q+'" data-v="'+n+'">'+n+'</button>';h+='</div><textarea class="note" id="note_'+idx+'" placeholder="Noter..."></textarea></div>';content.insertAdjacentHTML('beforeend',h);idx++;});}document.querySelectorAll('[data-id]').forEach(b=>b.onclick=function(){scores[this.dataset.id]=+this.dataset.v;this.parentNode.querySelectorAll('button').forEach(x=>x.classList.remove('sel'));this.classList.add('sel');update();});let pie,radar;function update(){let total=Object.values(scores).reduce((a,b)=>a+b,0);score.textContent=total;pct.textContent=Math.round(total/200*100);prog.style.width=(Object.keys(scores).length/20*100)+'%';let strong=[],weak=[];document.querySelectorAll('.sel').forEach(b=>{let v=+b.dataset.v,q=b.dataset.q;if(v>=9)strong.push('✅ '+q);if(v<=5)weak.push('⚠️ '+q);});strengths.innerHTML=strong.slice(0,5).join('<br>')||'Ingen';document.getElementById('weak').innerHTML=weak.slice(0,5).join('<br>')||'Ingen';analysis.innerHTML=total>=170?'💚 Meget stærkt match':total>=140?'🟢 Lovende match':'🟡 Kræver mere afklaring';let arr=[0,0,0,0];for(let i=0;i<5;i++)arr[0]+=scores[i]||0;for(let i=5;i<10;i++)arr[1]+=scores[i]||0;for(let i=10;i<15;i++)arr[2]+=scores[i]||0;for(let i=15;i<20;i++)arr[3]+=scores[i]||0;if(window.Chart){if(pie)pie.destroy();if(radar)radar.destroy();pie=new Chart(document.getElementById('pie'),{type:'pie',data:{labels:['Åndelige','Karakter','Venskab','Ægteskab'],datasets:[{data:arr}]}});radar=new Chart(document.getElementById('radar'),{type:'radar',data:{labels:['Åndelige','Karakter','Venskab','Ægteskab'],datasets:[{label:'Score',data:arr}]},options:{scales:{r:{min:0,max:50}}}});}}function saveJson(){let notes={};document.querySelectorAll('.note').forEach(n=>notes[n.id]=n.value);let d={candidate:candidate.value,scores:scores,notes:notes};let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download=(candidate.value||'kandidat')+'.json';a.click();}loadInput.onchange=e=>{let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result);candidate.value=d.candidate||'';scores=d.scores||{};for(let k in (d.notes||{})){let el=document.getElementById(k);if(el)el.value=d.notes[k];}document.querySelectorAll('[data-id]').forEach(b=>{let k=b.dataset.id;if(scores[k]==b.dataset.v)b.classList.add('sel');});update();};r.readAsText(f);};function printReport(){window.print();}</script></body></html>
